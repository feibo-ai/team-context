<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{SLUG}}</title>
<style>__STYLE__</style></head>
<body>
<div class="eyebrow">RESEARCH · 研究</div>
<h1>{{SLUG}}</h1>
<div class="meta"><span>Phase <b>RPI Research</b></span></div>
<h2>问题</h2><div class="field"><div class="field-label">Question</div>{{QUESTION}}</div>
<h2>发现</h2><div class="field"><div class="field-label">Findings</div>{{FINDINGS}}</div>
<h2>待解问题</h2><div class="field">{{OPEN_QUESTIONS}}</div>
<footer>team-context · RPI Research phase · multica issue 内渲染</footer>
</body></html>
<!--
  tc-render research 模板 — 逐字复刻 team-context-mcp render/research-html.ts + renderShell。
  产出前替换:
    __STYLE__           ← assets/style.css 全文(见 PUBLISH.md «CSS 内联»)
    {{SLUG}}            ← slug(title + h1)
    {{QUESTION}}        ← 研究问题(esc)
    {{FINDINGS}}        ← 发现。骨架阶段(research_create 初版)填字面:(待 fresh session 深度调研填充)
                          填充阶段(fresh research session)填真实 findings HTML,再经命门A 发新评论
    {{OPEN_QUESTIONS}}  ← 待解问题。骨架阶段填:(research 过程中浮现的开放问题)
  动态注入①(日期):文件名 docs/research/research_<YYYY-MM-DD>_<topic>.html 用今天日期(date -u +%F)。
  注:research 是「骨架→填充」两段式 —— 骨架本地生成,填充后的 findings 经命门A 作为 issue 评论发布(!file 内联渲染),
      绝不自动写进 issue description(见 tc-2-research)。
  所有文本字段须 HTML-escape。
-->
