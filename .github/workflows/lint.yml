name: lint
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Lint SKILL.md frontmatter
        run: |
          set -e
          fail=0
          for skill in skills/*/SKILL.md; do
            # Extract only the YAML frontmatter (between the first two --- lines)
            # so yq doesn't try to parse the markdown body as additional YAML docs.
            fm=$(awk '/^---$/{c++; if(c==2)exit; next} c==1' "$skill")
            name=$(echo "$fm" | yq eval '.name' - 2>/dev/null || echo NULL)
            desc=$(echo "$fm" | yq eval '.description' - 2>/dev/null || echo NULL)
            if [ "$name" = "NULL" ] || [ "$name" = "null" ]; then
              echo "ERROR: missing 'name' in $skill"; fail=1
            fi
            if [ "$desc" = "NULL" ] || [ "$desc" = "null" ]; then
              echo "ERROR: missing 'description' in $skill"; fail=1
            fi
          done
          exit $fail

      - name: Check SKILL body ≤ 2000 tokens
        run: |
          set -e
          fail=0
          for skill in skills/*/SKILL.md; do
            words=$(wc -w < "$skill")
            tokens=$((words * 13 / 10))
            if [ $tokens -gt 2000 ]; then
              echo "ERROR: $skill is ~$tokens tokens (limit 2000)"
              fail=1
            fi
          done
          exit $fail

      - name: Check claude_md_team_global.md ≤ 3000 tokens
        run: |
          if [ -f claude_md_team_global.md ]; then
            words=$(wc -w < claude_md_team_global.md)
            tokens=$((words * 13 / 10))
            if [ $tokens -gt 3000 ]; then
              echo "ERROR: claude_md_team_global.md is ~$tokens tokens (limit 3000)"
              exit 1
            fi
          fi

      - name: Lint autopilot YAML schema
        run: |
          set -e
          for yaml in autopilots/*.yaml; do
            [[ -f "$yaml" ]] || continue
            for required in name description mode agent.name prompt trigger.cron trigger.timezone; do
              val=$(yq eval ".${required}" "$yaml")
              if [ "$val" = "null" ] || [ -z "$val" ]; then
                echo "ERROR: $yaml missing required field: $required"
                exit 1
              fi
            done
            # Validate mode enum
            mode=$(yq eval '.mode' "$yaml")
            if [ "$mode" != "run_only" ] && [ "$mode" != "create_issue" ]; then
              echo "ERROR: $yaml mode must be run_only or create_issue (got: $mode)"
              exit 1
            fi
          done

      - name: Lint autopilot PB-04 guardrails (SOP hard line)
        run: |
          set -e
          fail=0
          for yaml in autopilots/*.yaml; do
            [[ -f "$yaml" ]] || continue
            name=$(yq eval '.name' "$yaml")

            # 1) guardrails section must exist
            g_present=$(yq eval '.guardrails' "$yaml")
            if [[ "${g_present}" == "null" || -z "${g_present}" ]]; then
              echo "ERROR: ${name}: missing 'guardrails' section (SOP PB-04 violation)"
              fail=1
              continue
            fi

            # 2) forbidden_commands ≥ 5 entries
            fc_count=$(yq eval '.guardrails.forbidden_commands | length' "$yaml")
            if [ "${fc_count}" = "null" ] || [ -z "${fc_count}" ] || [ "${fc_count}" -lt 5 ]; then
              echo "ERROR: ${name}: guardrails.forbidden_commands has ${fc_count} entries (must be ≥ 5)"
              fail=1
            fi

            # 3) forbidden_commands must contain 'git push'
            if ! yq eval '.guardrails.forbidden_commands[]' "$yaml" 2>/dev/null | grep -qi "git push"; then
              echo "ERROR: ${name}: guardrails.forbidden_commands missing 'git push'"
              fail=1
            fi

            # 4) forbidden_paths must have at least 1 entry
            fp_count=$(yq eval '.guardrails.forbidden_paths | length' "$yaml")
            if [ "${fp_count}" = "null" ] || [ -z "${fp_count}" ] || [ "${fp_count}" -lt 1 ]; then
              echo "ERROR: ${name}: guardrails.forbidden_paths must have ≥ 1 entry"
              fail=1
            fi

            # 5) max_budget_usd ≤ 150 hard cap
            budget=$(yq eval '.guardrails.max_budget_usd' "$yaml")
            if [ "${budget}" = "null" ] || [ -z "${budget}" ]; then
              echo "ERROR: ${name}: missing guardrails.max_budget_usd"
              fail=1
            elif [ "${budget}" -gt 150 ]; then
              echo "ERROR: ${name}: max_budget_usd ${budget} > 150 hard cap (SOP PB-04)"
              fail=1
            fi

            # 6) max_runtime_minutes must be positive
            runtime=$(yq eval '.guardrails.max_runtime_minutes' "$yaml")
            if [ "${runtime}" = "null" ] || [ -z "${runtime}" ] || [ "${runtime}" -le 0 ]; then
              echo "ERROR: ${name}: guardrails.max_runtime_minutes must be a positive number (got: ${runtime})"
              fail=1
            fi
          done
          exit $fail

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: tc-render publish 硬校验 + red-team + 命门A 灾备契约漂移探针 (pytest)
        run: |
          python -m pip install --quiet pytest pyyaml
          # 已知取舍:本 job 只 checkout team-context 单仓,file-cards.ts 在 tc-multica 仓 →
          # 跨仓漂移检测(test_contract_aligned_to_frontend_regex)在 CI 里 SKIP(诚实兜底·非假绿)。
          # 硬校验 + red-team + 契约自洽全跑。要 CI 也防前端正则漂移:checkout tc-multica
          # 或注入 FILE_CARDS_TS=<file-cards.ts 路径>(前端正则的权威应在 tc-multica 仓 CI 守护)。
          python -m pytest skills/tc-render/tests/ -q

      - name: repo→registry skill 对账 (④c)
        run: |
          # 已知取舍:GitHub runner 无 multica CLI / 无 token → 脚本诚实 SKIP(exit 0)。
          # 装 multica + 注入 MULTICA_TOKEN(secret)后,repo 有而 registry 缺的 skill → CI fail。
          bash scripts/check-registry-sync.sh
