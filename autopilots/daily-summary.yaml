name: daily-summary
description: |
  Reads today's commits + multica issue updates, composes a digest,
  pushes to the feishu team group via notify_team. Data scope (个人/全队)
  is read from the AUTOPILOT_SCOPE env at runtime.
  SOP coverage: P-6 Daily D-05 (notify_team only · P2P removed per 2026-05-28 spec §1.2)

trigger:
  kind: schedule
  cron: "0 18 * * 1-5"
  timezone: Asia/Shanghai

mode: run_only

agent:
  name: daily-summary-bot-codex
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (autopilot_lint enforces)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/.multica/config.json"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  **输出语言要求：所有最终发送到飞书的内容必须用简体中文。** 命令行操作和内部思考可用英文。

  读环境变量 AUTOPILOT_SCOPE 决定数据范围:
    - "team"    → 全队今日数据
    - "<email>" → 只本人 (assignee / commit author == $AUTOPILOT_SCOPE)
  另读 AUTOPILOT_SCOPE_NAME = 显示名(个人版如「付雨生」· 全队版为「全队」)。
  卡片标题/正文里标注身份(范围 / owner / 负责人)一律用 AUTOPILOT_SCOPE_NAME,绝不出现邮箱原文;
  AUTOPILOT_SCOPE(邮箱)仅用于过滤查询与文件名。
  卡片里的日期一律用 {{date}}(系统注入,形如 2026-06-03)· 阿拉伯数字,绝不写成中文数字(如「二零二六年六月三日」)。

  Step 1 · 收集数据 (用 MCP 工具 · 不 shell-out 飞书)
    team:  multica issue list --updated-after $(date -v-1d +%Y-%m-%d)
           cd ~/projects && for r in */; do (cd "$r" && git log --since="midnight" --pretty=format:"- %s (%an)"); done
    个人:  multica issue list --assignee "$AUTOPILOT_SCOPE" --updated-after $(date -v-1d +%Y-%m-%d)
           (commits 只统计 author 是本人的)

  Step 2 · Compose card
    team:  标题「全队 · 今日总结」· 按 shipping member 分 section
    个人:  标题「${AUTOPILOT_SCOPE_NAME} · 今日总结」· section: Shipped / In Progress / Tomorrow / Signals
    Signals (个人): 今天 `git log | grep -c "wip:"` → /clear 次数 · close 了 issue 但没 case_create → "未写 debrief" 提醒

  Step 3 · 推团队群 (唯一渠道)
    Call MCP tool: notify_team({ card: <card-json> })
    (feishu_team_chat_id 由 tcmcp-remote 从 integration config 解析 · zero shell-out)
    返回 { messageId } 视为成功 · 失败记录不 crash。

  ⚠️ 绝不调用 dm_member 或任何 P2P (spec §1.2 · 一律 notify_team 推群 · 透明文化)。
