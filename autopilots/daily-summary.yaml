name: daily-summary
description: |
  Reads today's commits + multica issue updates, composes a digest,
  pushes to the feishu team group via notify_team. Team-scope only
  (2026-07-03 收敛:个人卡并入团队卡,「已交付」按人归并)。
  SOP coverage: P-6 Daily D-05 (notify_team only · P2P removed per 2026-05-28 spec §1.2)

trigger:
  kind: schedule
  cron: "0 18 * * 1-5"
  timezone: Asia/Shanghai

mode: run_only

# 身份/通用约束(语言·SCOPE 语义·notify_team-only·issue 纪律)在 agent instructions 单源:
# autopilots/_agent-instructions.md(由 _autopilot-common.sh 注入 助理·<显示名>)
agent:
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/.multica/config.json"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  这是【傍晚总结】卡片 —— 回顾今天 shipped 了什么(前瞻是早晨的 daily-kickoff)。

  Step 1 · 收集数据(日期跨平台:YEST=$(date -v-1d +%Y-%m-%d 2>/dev/null || date -d '1 day ago' +%Y-%m-%d))
    主源(权威 · 工作台账): multica issue 活动
      multica issue list --updated-after $YEST
    辅源(代码事实 · GitHub 组织活动,配方见 agent instructions §GitHub 数据源):
      feibo-ai 全仓 24h 窗口的 commits(按 login→显示名归并计数)+ PR(新开/已合并清单)
      (GitHub 源不可用 → 交付统计缺 PR 侧,如实注明,不用本地 git 兜底猜)

  Step 2 · Compose card(行动指令式 · 骨架/纪律单源 agent instructions · header=indigo)
    标题: 每日总结 · ${AUTOPILOT_SCOPE_NAME} · MM-DD
    行动条目(欠账类 · 全卡 ≤5 条):
      ⚠ <人名>:「<工作内容>」已关闭未写复盘 — 补 case(用 tc-review skill)
    尾行锚(两行 · 非行动 · 内容优先编号不上卡):
      今日交付 N:人名-「要点」 · …(≤3 组,溢出「…等 N 项」;交付 = merged PR + done issue,
      按人归并,要点用 PR/issue 标题;commit 数只作参考计入「人名(√N)」,不逐条列)
      明日:「内容」(人) · …(未来计划 ≤3 项;取 in_progress 最新 handoff 的 nextAction,
      次选待启动 top;没有明确来源就省略本行,不硬凑)
    零欠账且零交付 → 不发卡,text 一行:「每日总结·全队」今日无交付无欠账 · 数据截至 HH:MM
    零欠账有交付 → 也可只发 text 一行:今日交付 N:人名-要点 · …(交付本身不是行动,不值一张卡)

  Step 3 · notify_team({ card: <card-json> })(或 { text }) 推团队群。
