name: daily-summary
description: |
  Workspace agent reads today's commits + multica issue updates,
  composes a 200-word digest, sends a team summary to feishu group
  AND per-user P2P summaries via MCP tools.
  SOP coverage: P-6 Daily D-05 (per-user variant per W5 design)

trigger:
  kind: schedule
  cron: "0 18 * * 1-5"
  timezone: Asia/Shanghai

mode: run_only

agent:
  name: daily-summary-bot
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (autopilot_lint enforces)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/.multica/config.json"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  **输出语言要求：所有最终发送到飞书的内容（card title、各 section 标题与正文、fallback text）必须用简体中文。** 命令行操作和内部思考可用英文，但用户看到的所有文字都是中文。

  Generate today's team summary. Use the MCP tools (not shell-out).

  Step 1 · 收集团队数据
    multica issue list --updated-after $(date -v-1d +%Y-%m-%d)
    cd ~/projects && for r in */; do (cd $r && git log --since="midnight" --pretty=format:"- %s (%an)"); done

  Step 2 · Compose team-group card (interactive · groups by member)
    Format: card with sections per shipping member.

  Step 3 · 推团队群
    Call MCP tool: notify_team({ card: <card-json> })
    (resolves feishu_team_chat_id from integration config · zero shell-out)

  Step 4 · 遍历 team_members (read from integration config)
    For each member { email, display_name }:
      a. 收集本人今天产出 (filter step 1 data by author=display_name)
      b. 收集本人本周 plan-approved issue (multica issue list --label plan-approved --assignee X)
      c. Detect SOP signals:
         - Today's `git log | grep -c "wip:"` for this author → /clear count
         - close issues 没 case_create → 'unwritten debrief' nudge
      d. Compose personal card (sections: Shipped, In Progress, Tomorrow, Signals)
      e. Call MCP tool: dm_member({ email, card: <personal-card-json> })

  Verify: each MCP tool call should return { messageId: ... }. Log failures · don't crash on one member's send failure.
