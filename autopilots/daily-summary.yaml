name: daily-summary
description: |
  Reads today's commits + multica issue updates, composes a digest,
  pushes to the feishu team group via notify_team. Data scope (个人/全队)
  is read from the AUTOPILOT_SCOPE env at runtime.
  SOP coverage: P-6 Daily D-05 (notify_team only · P2P removed per 2026-05-28 spec §1.2)

trigger:
  kind: schedule
  cron: "0 18 * * 1-5"
  timezone: Asia/Shanghai

mode: run_only

# 身份/通用约束(语言·SCOPE 语义·notify_team-only·issue 纪律)在 agent instructions 单源:
# autopilots/_agent-instructions.md(由 _autopilot-common.sh 注入 assistant-bot-<scope>)
agent:
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/.multica/config.json"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  这是【傍晚总结】卡片 —— 回顾今天 shipped 了什么(前瞻是早晨的 daily-kickoff)。

  Step 1 · 收集数据
    team:  multica issue list --updated-after $(date -v-1d +%Y-%m-%d)
           cd ~/projects && for r in */; do (cd "$r" && git log --since="midnight" --pretty=format:"- %s (%an)"); done
    个人:  multica issue list --assignee "$AUTOPILOT_SCOPE" --updated-after $(date -v-1d +%Y-%m-%d)
           (commits 只统计 author 是本人的)

  Step 2 · Compose card
    team:  标题「全队 · 今日总结」· 按 shipping member 分 section
    个人:  标题「${AUTOPILOT_SCOPE_NAME} · 今日总结」· section: Shipped / In Progress / Tomorrow / Signals
    Signals (个人): 今天 `git log | grep -c "wip:"` → /clear 次数 · close 了 issue 但没 case_create → "未写 debrief" 提醒

  Step 3 · notify_team({ card: <card-json> }) 推团队群。
