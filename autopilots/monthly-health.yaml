name: monthly-health
description: |
  Run tc-ops monthly health 脚本, upload markdown to feishu doc,
  push link to team group, archive to wiki.
  SOP coverage: P-6 Monthly M-01

trigger:
  kind: schedule
  cron: "0 10 1 * *"
  timezone: Asia/Shanghai

mode: run_only

agent:
  name: monthly-health-bot-codex
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
# Note: monthly-health writes to /tmp/ only. Local git archive is done by humans (or
# a separate cron sync script with elevated trust outside autopilot scope).
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/team-context/.git"
  max_budget_usd: 15
  max_runtime_minutes: 30

prompt: |
  **输出语言要求：报告 markdown + 飞书全部用简体中文。** 命令行操作可英文。

  读环境变量 AUTOPILOT_SCOPE 决定范围:
    - "team"    → 全队月度健康报告(tc-ops 脚本)
    - "<email>" → 本人月度切片

  Step 1 · 生成报告
    team:  运行月度健康报告:`multica skill pull tc-ops` 后 `python3 ~/.claude/skills/tc-ops/monthly_health.py ~/team-context [<project-repo>...]`(输出 markdown);取代旧 monthly_health_report MCP 工具
           Tool writes markdown to /tmp/monthly-health-{{date}}.md.
    个人:  汇总本人本月 issue / case / commit + SOP 信号 (handoff 次数 · 未写 debrief 等)
           写到 /tmp/monthly-personal-${AUTOPILOT_SCOPE%@*}-{{date}}.md

  Step 2 · (仅 team) Upload + archive (ONE MCP call, no shell-out)
    Call MCP tool archive_to_wiki({
      markdownPath: "/tmp/monthly-health-{{date}}.md",
      title: "Monthly Health {{date}}"
    })
    Returns: { docUrl, nodeToken }。个人版跳过 wiki 归档。

  Step 3 · Push link to team group
    team:  notify_team({ text: "📊 全队 Monthly Health · {{date}} — <docUrl>" })
    个人:  notify_team({ card: 本人月度切片摘要 })
    绝不 dm_member。

  Step 4 · (仅 team) Stage local archive (NO git commit · guardrails forbid)
    mkdir -p ~/team-context/health/monthly
    cp /tmp/monthly-health-{{date}}.md ~/team-context/health/monthly/{{date}}.md
    (human commits later)
