name: monthly-health
description: |
  Trigger monthly_health_report MCP tool, upload markdown to feishu doc,
  push link to team group, archive to wiki.
  SOP coverage: P-6 Monthly M-01

trigger:
  kind: schedule
  cron: "0 10 1 * *"
  timezone: Asia/Shanghai

mode: run_only

agent:
  name: monthly-health-bot
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (autopilot_lint enforces)
# Note: monthly-health writes to /tmp/ only. Local git archive is done by humans (or
# a separate cron sync script with elevated trust outside autopilot scope).
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/team-context/.git"
  max_budget_usd: 15
  max_runtime_minutes: 30

prompt: |
  **输出语言要求：报告 markdown 内容、飞书 doc 标题、飞书群消息全部用简体中文。** 命令行操作可英文，用户看到的所有内容都是中文。

  Step 1 · Generate report
    Call MCP tool monthly_health_report({ teamContextRepo: ~/team-context, projectRepos: [...] })
    Tool writes markdown to /tmp/monthly-health-{{date}}.md.

  Step 2 · Upload + archive + notify (ONE MCP call, no shell-out)
    Call MCP tool archive_to_wiki({
      markdownPath: "/tmp/monthly-health-{{date}}.md",
      title: "Monthly Health {{date}}"
    })
    Returns: { docUrl, nodeToken }

  Step 3 · Push link to team group
    Call MCP tool notify_team({
      text: "📊 Monthly Health Report · {{date}} — <docUrl>"
    })

  Step 4 · Stage local archive (NO git commit · guardrails forbid)
    mkdir -p ~/team-context/health/monthly
    cp /tmp/monthly-health-{{date}}.md ~/team-context/health/monthly/{{date}}.md
    (human commits later)
