name: daily-kickoff
description: |
  Weekday-morning kickoff. Reads today's focus (in_progress + 计划-已批准 待启动
  + 待评审 + 卡住的 handoff) and pushes a 今日开工 card to the feishu team group
  via notify_team. Forward-looking morning counterpart to daily-summary (evening
  recap). Team-scope only(2026-07-03 收敛:个人卡并入团队卡,按人归并展示)。
  SOP coverage: P-6 Daily D-01 (morning kickoff · notify_team only · 透明文化)

trigger:
  kind: schedule
  cron: "0 9 * * 1-5"
  timezone: Asia/Shanghai

mode: run_only

# 身份/通用约束(语言·SCOPE 语义·notify_team-only·issue 纪律)在 agent instructions 单源:
# autopilots/_agent-instructions.md(由 _autopilot-common.sh 注入 助理·<显示名>)
agent:
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
    - "~/.multica/config.json"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  这是【早晨开工】卡片 —— 前瞻「今天该推进什么」,不是回顾(回顾是傍晚的 daily-summary)。
  与周一的 monday-kickoff 互补:那条讲「本周计划」,这条讲「今日聚焦」。

  Step 1 · 收集今日聚焦
    进行中:   multica issue list --status in_progress
    待启动:   multica issue list --label 计划-已批准 --status todo
    待评审:   multica issue list --label 计划-评审中
    PR 待评审: GitHub 组织活动(配方见 agent instructions §GitHub 数据源):
              open PR 且 requested_reviewers 非空 → 每条记 repo#编号/标题/等谁/挂起时长
    卡住信号: 进行中 issue 里,最近一次 Current State handoff 时间戳 > 24h 的标出来
              (multica issue get <id> 看最新 handoff 评论时间)

  Step 2 · Compose card(行动指令式 · 骨架/纪律单源 agent instructions · header=wathet)
    标题: 每日开工 · ${AUTOPILOT_SCOPE_NAME} · MM-DD
    全员点名(每成员恰好一行 · roster 纪律见 agent instructions):
      每人一行 = 人名:「今天最重要的在办内容」+ 状态:
        需要动作 → ⚠/▸ 「<计划/PR 标题>」等你评审 — 挂 N 天 / 「<内容>」已批准 N 天未启动 — 今天启动或归档
        卡住     → 「<内容>」卡在 <卡点一句话(最新 handoff 的 nextAction/deadEnds;查无则归正常档)>
        正常     → 「<内容>」推进中,今日 <下一步一句(取 handoff nextAction/计划)>
        无在办   → 今日无在办,可领「<待启动 top 内容>」
      数据来源:multica issue(assignee 归并)+ GitHub PR 待评审(requested_reviewers → 该评审人的行)
    全员正常档 → 不发卡,text 一行:「每日开工·全队」全员推进中:每人一个内容短语 · 数据截至 HH:MM

  Step 3 · notify_team({ card: <card-json> })(或零行动日的 { text }) 推团队群。
