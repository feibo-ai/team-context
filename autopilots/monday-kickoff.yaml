name: monday-kickoff
description: |
  Monday roundup. Creates issue with week's 计划-已批准 items, pushes to feishu.
  SOP coverage: P-6 Weekly W-01

trigger:
  kind: schedule
  cron: "30 9 * * 1"
  timezone: Asia/Shanghai

mode: create_issue
issue_title_template: "Monday Kickoff {{date}}"

# 身份/通用约束(语言·SCOPE 语义·notify_team-only·issue 纪律)在 agent instructions 单源:
# autopilots/_agent-instructions.md(由 _autopilot-common.sh 注入 assistant-bot-<scope>)
agent:
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  这是【周一计划汇总】—— 讲「本周计划」(每日聚焦是 daily-kickoff 的事)。

  1. 列 计划-已批准 issue
       team:  multica issue list --label 计划-已批准
       个人:  multica issue list --label 计划-已批准 --assignee "$AUTOPILOT_SCOPE"
  2. 每条: title · DRI · appetite · 最近一次 Current State handoff 时间戳
  3. (仅 team) 识别跨项目边界

  推团队群:
    notify_team({ card: <kickoff-card-json> })
    team 标题「全队 Monday Kickoff · {{date}}」· 个人「${AUTOPILOT_SCOPE_NAME} · Monday Kickoff · {{date}}」
    Card body: top 5 计划-已批准 + DRI + appetite + handoff age。

  team 版 mode=create_issue 会建周计划 issue;个人版 run_only 只推群。
