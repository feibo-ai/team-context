name: monday-kickoff
description: |
  Monday roundup. Creates issue with week's 计划-已批准 items, pushes to feishu.
  SOP coverage: P-6 Weekly W-01

trigger:
  kind: schedule
  cron: "30 9 * * 1"
  timezone: Asia/Shanghai

mode: create_issue
issue_title_template: "Monday Kickoff {{date}}"

agent:
  name: weekly-roundup-bot-codex
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (autopilot_lint enforces)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  **输出语言要求：multica issue body + 飞书 card 全部用简体中文。** 命令行操作可英文。

  读环境变量 AUTOPILOT_SCOPE 决定范围:
    - "team"    → 全队本周计划
    - "<email>" → 只本人

  1. 列 计划-已批准 issue
       team:  multica issue list --label 计划-已批准
       个人:  multica issue list --label 计划-已批准 --assignee "$AUTOPILOT_SCOPE"
  2. 每条: title · DRI · appetite · 最近一次 Current State handoff 时间戳
  3. (仅 team) 识别跨项目边界

  推团队群:
    notify_team({ card: <kickoff-card-json> })
    team 标题「全队 Monday Kickoff · {{date}}」· 个人「${AUTOPILOT_SCOPE%@*} · Monday Kickoff · {{date}}」
    Card body: top 5 计划-已批准 + DRI + appetite + handoff age。

  ⚠️ 绝不调 dm_member。team 版 mode=create_issue 会建周计划 issue · 个人版只推群不建 issue。
