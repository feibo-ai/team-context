name: monday-kickoff
description: |
  Monday roundup. Creates issue with week's 计划-已批准 items, pushes to feishu.
  SOP coverage: P-6 Weekly W-01

trigger:
  kind: schedule
  cron: "30 9 * * 1"
  timezone: Asia/Shanghai

mode: create_issue
issue_title_template: "Monday Kickoff {{date}}"

# 身份/通用约束(语言·SCOPE 语义·notify_team-only·issue 纪律)在 agent instructions 单源:
# autopilots/_agent-instructions.md(由 _autopilot-common.sh 注入 助理·<显示名>)
agent:
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 5
  max_runtime_minutes: 10

prompt: |
  这是【周一计划汇总】—— 讲「本周计划」(每日聚焦是 daily-kickoff 的事)。

  1. 列 计划-已批准 issue: multica issue list --label 计划-已批准
  2. 每条: title · DRI · appetite · 最近一次 Current State handoff 时间戳
  3. 识别跨项目边界

  Compose card(骨架/文案纪律见 agent instructions · header=green):
    标题: 周一计划 · ${AUTOPILOT_SCOPE_NAME} · MM-DD
    概览 fields: 本周已批准 / 跨项目边界
    内容段:「本周计划」 ▸ 标题 — DRI · 体量 · 交接 N 小时前(≤3 条,溢出末行「…另有 N 条」)
    本周无已批准计划 → 按 agent instructions 静默日降级为一行 text。
    note 页脚:「已建周计划 issue」
    notify_team({ card: <card-json> }) 推团队群。

  mode=create_issue:平台按 issue_title_template 建周计划 issue,agent 只填内容。
