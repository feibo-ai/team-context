name: wednesday-stats
description: |
  Mid-week CLAUDE.md and skills health check, pushed to feishu.
  SOP coverage: P-6 Weekly W-02

trigger:
  kind: schedule
  cron: "0 9 * * 3"
  timezone: Asia/Shanghai

mode: run_only

# 身份/通用约束(语言·SCOPE 语义·notify_team-only·issue 纪律)在 agent instructions 单源:
# autopilots/_agent-instructions.md(由 _autopilot-common.sh 注入 助理·<显示名>)
agent:
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (ac_lint_yaml + CI enforce; 原 autopilot_lint MCP → tc-ops/autopilot_lint.py)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 5
  max_runtime_minutes: 15

prompt: |
  这是【周三统计】—— CLAUDE.md 与 skill 健康度的周中体检。

  1. cd ~/team-context && git log --since="last Sunday" claude_md_team_global.md
  2. 运行 `multica skill lint`(找 stale + 缺 owner;取代旧 skill_lint MCP 工具)
  3. Heuristic regex for duplicate rules

  Compose card(行动指令式 · 骨架/纪律单源 agent instructions · header=orange):
    标题: 周三体检 · ${AUTOPILOT_SCOPE_NAME} · MM-DD
    行动条目(全卡 ≤5 条 · 每条给到人+动作):
      ▸ <owner 或 DRI>:skill <名> 90 天未 review — 过一遍后 multica skill touch-reviewed
      ▸ DRI:skill <名> 缺 owner — skill-pack.yaml 登记 + registry 补 owner
      ▸ DRI:claude_md 疑似重复规则「…」 — 合并或删
    尾行锚: (skill 共 N 个 · 其余健康)
    零风险 → 不发卡,text 一行:「周三体检·全队」全部健康 · skill N 个 · 数据截至 HH:MM

  notify_team({ card: <card-json> })(或 { text }) 推团队群。
