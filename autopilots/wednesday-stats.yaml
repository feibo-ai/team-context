name: wednesday-stats
description: |
  Mid-week CLAUDE.md and skills health check, pushed to feishu.
  SOP coverage: P-6 Weekly W-02

trigger:
  kind: schedule
  cron: "0 9 * * 3"
  timezone: Asia/Shanghai

mode: run_only

agent:
  name: wednesday-stats-bot
  integration_ref: team-context-mcp  # resolved at apply time

# PB-04 guardrails (autopilot_lint enforces)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 5
  max_runtime_minutes: 15

prompt: |
  **输出语言要求：飞书 card title/各 section/正文全部用简体中文。** 命令行操作可英文，用户看到的所有内容都是中文。

  1. cd ~/team-context && git log --since="last Sunday" claude_md_team_global.md
  2. Call MCP tool skill_lint (find stale + missing-owner)
  3. Heuristic regex for duplicate rules

  Compose card:
    - CLAUDE.md this week: <N> rules
    - Stale skills: <N>, oldest: <name>
    - Possible duplicates: <findings>

  Push via MCP: notify_team({ card: <stats-card-json> })
