name: wednesday-stats
description: |
  Mid-week CLAUDE.md and skills health check, pushed to feishu via feishu-cli.
  SOP coverage: P-6 Weekly W-02

trigger:
  kind: schedule
  cron: "0 9 * * 3"
  timezone: Asia/Shanghai

mode: run_only

agent:
  name: wednesday-stats-bot

# PB-04 guardrails (autopilot_lint enforces)
guardrails:
  forbidden_commands:
    - "git push"
    - "git push --force"
    - "git commit"
    - "npm publish"
    - "rm -rf"
    - "psql.* drop"
    - "* db migrate"
  forbidden_paths:
    - ".env*"
    - ".ssh/*"
    - "secrets/*"
  max_budget_usd: 5
  max_runtime_minutes: 15

prompt: |
  1. `cd ~/team-context && git log --since="last Sunday" claude_md_team_global.md` — count net adds
  2. Call team-context-mcp `skill_lint` tool with skillsDir=~/team-context/skills
     — collect skills with stale last_reviewed_at (>90d) or missing owner
  3. Heuristic regex for duplicate rules in CLAUDE.md

  Compose interactive card JSON to /tmp/wednesday-card.json with sections:
  - **CLAUDE.md this week**: <N> rules added, <list>
  - **Stale skills**: <N>, oldest: <name> (last reviewed <date>)
  - **Possible duplicates**: <heuristic findings>

  Push to feishu:
    feishu-cli msg send \
      --receive-id-type chat_id \
      --receive-id "$FEISHU_TEAM_CHAT_ID" \
      --msg-type interactive \
      --content-file /tmp/wednesday-card.json
